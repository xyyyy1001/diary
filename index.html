<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情 & 蛐蛐 (Supabase 版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat-flow { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background: #222; color: #fff; border-bottom-right-radius: 2px; border: 1px solid #333; }
        .gemini { align-self: flex-start; background: #1a1a2e; color: #7ee787; border-bottom-left-radius: 2px; border: 1px solid #23304a; }
        .gemini::before { content: "Gemini"; font-size: 0.7rem; color: #4e5d7e; position: absolute; top: -18px; left: 5px; }
        .input-area { display: flex; gap: 10px; padding: 10px 0; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; border-radius: 20px; padding: 10px 15px; color: #fff; outline: none; }
        button { background: #58a6ff; border: none; color: white; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-flow"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="在这儿写下你想蛐蛐的...">
        <button onclick="send()">发送</button>
    </div>

    <script>
        const _URL = 'https://viozsruijlgzhhvhbrts.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpb3pzcnVpamxnemhodmhicnRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODE5NDUsImV4cCI6MjA5MzQ1Nzk0NX0.6NltusZMTdH21LzncaRvkprG7kmvGtRkzmCLVA0L0Z0';
        const supabase = supabase.createClient(_URL, _KEY);

        async function loadData() {
            const { data } = await supabase.from('diary').select('*').order('created_at', { ascending: true });
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = data.map(m => `<div class="msg ${m.author === 'Gemini' ? 'gemini' : 'user'}">${m.content}</div>`).join('');
            flow.scrollTop = flow.scrollHeight;
        }

        async function send() {
            const val = document.getElementById('user-input').value;
            if (!val) return;
            await supabase.from('diary').insert([{ content: val, author: 'User' }]);
            document.getElementById('user-input').value = '';
            loadData();
        }

        // 没隔5秒刷新一次，看我回了没
        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
