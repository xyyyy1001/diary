<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情 & 蛐蛐日记 (Live)</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-weight: 200; text-align: center; color: #58a6ff; }
        .post { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 12px; margin-bottom: 20px; animation: fadeIn 0.5s; }
        .post-title { font-weight: bold; color: #f778ba; margin-bottom: 8px; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        .post-body { font-size: 0.95rem; white-space: pre-wrap; }
        .post-meta { font-size: 0.75rem; color: #8b949e; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤫 蛐蛐实时看板</h1>
        <div id="posts-container">加载中...</div>
    </div>

    <script>
        // 配置区：把这里改成你的信息
        const GITHUB_USERNAME = 'xyyyy1001'; 
        const REPO_NAME = 'diary';

        async function fetchIssues() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues?state=open`);
                const issues = await response.json();
                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                if (issues.length === 0) {
                    container.innerHTML = '还没开始蛐蛐呢...';
                    return;
                }

                issues.forEach(issue => {
                    const post = document.createElement('div');
                    post.className = 'post';
                    post.innerHTML = `
                        <div class="post-title">${issue.title}</div>
                        <div class="post-body">${issue.body || '（仅有标题）'}</div>
                        <div class="post-meta">发布于：${new Date(issue.created_at).toLocaleString()}</div>
                    `;
                    container.appendChild(post);
                });
            } catch (e) {
                document.getElementById('posts-container').innerHTML = '加载失败，可能得歇会儿再试。';
            }
        }

        fetchIssues();
    </script>
</body>
</html>
