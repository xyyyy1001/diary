<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>秘密基地 Final</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; }
        .gemini { align-self: flex-start; background: #161b22; border: 1px solid #238636; color: #7ee787; }
        .input-bar { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-bar">
        <input type="text" id="ipt" placeholder="写点什么...">
        <button onclick="send()">发送</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDiBOy5BmECF7k27wVn0v-BL2EikISqK60",
          authDomain: "diary-8de7a.firebaseapp.com",
          databaseURL: "https://diary-8de7a-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "diary-8de7a",
          storageBucket: "diary-8de7a.firebasestorage.app",
          messagingSenderId: "960175460075",
          appId: "1:960175460075:web:2d24b76c1964248a5678ae",
          measurementId: "G-RY6NER4WXY"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');

        function send() {
            const val = document.getElementById('ipt').value;
            if(!val) return;
            db.push({ content: val, author: 'User', time: Date.now() });
            document.getElementById('ipt').value = '';
        }

        db.on('value', (snap) => {
            const data = snap.val();
            const flow = document.getElementById('chat');
            if(!data) {
                flow.innerHTML = '<div style="color:#484f58;text-align:center;">基地信号正常，等待首条秘密...</div>';
                return;
            }
            // 将对象转为数组并按时间排序
            const sortedMsgs = Object.values(data).sort((a, b) => a.time - b.time);
            
            flow.innerHTML = sortedMsgs.map(m => `
                <div class="msg ${m.author === 'Gemini' ? 'gemini' : 'user'}">
                    ${m.content}
                </div>
            `).join('');
            
            // 关键：发完或收到新消息自动滚到底部
            setTimeout(() => { flow.scrollTop = flow.scrollHeight; }, 100);
        });

    </script>
</body>
</html>
