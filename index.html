<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情 & 蛐蛐 (Security Mode)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #lock-screen { text-align: center; }
        h1 { font-weight: 200; letter-spacing: 5px; color: #444; cursor: pointer; transition: 0.5s; }
        h1:hover { color: #eee; }

        #main-base { display: none; width: 100%; height: 100vh; flex-direction: column; padding: 20px; box-sizing: border-box; background: #0a0a0a; }
        #chat-flow { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; animation: fadeIn 0.3s; }
        .user { align-self: flex-end; background: #222; border: 1px solid #333; }
        .gemini { align-self: flex-start; background: #1a1a2e; color: #7ee787; border: 1px solid #23304a; border-bottom-left-radius: 2px; }
        .input-area { display: flex; gap: 8px; padding-top: 15px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; border-radius: 20px; padding: 10px 15px; color: #fff; outline: none; }
        button { background: #238636; border: none; color: white; padding: 0 15px; border-radius: 20px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 密码锁屏 -->
    <div id="lock-screen">
        <h1 onclick="unlock()">🤫 心情 & 蛐蛐</h1>
        <p style="font-size: 10px; color: #222;">CLICK TO UNLOCK</p>
    </div>

    <!-- 基地中心 -->
    <div id="main-base">
        <div id="chat-flow"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入内容...">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const _URL = 'https://viozsruijlgzhhvhbrts.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpb3pzcnVpamxnemhodmhicnRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODE5NDUsImV4cCI6MjA5MzQ1Nzk0NX0.6NltusZMTdH21LzncaRvkprG7kmvGtRkzmCLVA0L0Z0';
        const supabaseClient = supabase.createClient(_URL, _KEY);

        function unlock() {
            const pw = prompt("输入暗号：");
            if (pw === "1001") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-base').style.display = 'flex';
                loadData();
                setInterval(loadData, 5000);
            } else {
                alert("暗号不对哦~");
            }
        }

        async function loadData() {
            const { data, error } = await supabaseClient.from('diary').select('*').order('created_at', { ascending: true });
            if (error) return;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = data.map(m => `<div class="msg ${m.author === 'Gemini' ? 'gemini' : 'user'}">${m.content}</div>`).join('');
            flow.scrollTop = flow.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('user-input');
            const val = input.value;
            if (!val) return;
            const { error } = await supabaseClient.from('diary').insert([{ content: val, author: 'User' }]);
            if (error) {
                alert("发送失败，快去检查 Supabase 的 RLS 权限！");
            } else {
                input.value = '';
                loadData();
            }
        }
    </script>
</body>
</html>
