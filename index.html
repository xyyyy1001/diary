<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>秘密基地 v3.0</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; }
        #chat { display: flex; flex-direction: column; gap: 15px; max-width: 600px; margin: 0 auto; }
        .msg { padding: 12px; border-radius: 10px; line-height: 1.5; font-size: 14px; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; color: #e6edf3; }
        .gemini { align-self: flex-start; background: #161b22; border: 1px solid #238636; color: #7ee787; }
        .time { font-size: 10px; color: #484f58; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="chat">正在从 GitHub 秘密通道读取数据...</div>

    <script>
        // 只需要填这两个！
        const OWNER = '你的GitHub用户名'; 
        const REPO = '你的仓库名';

        async function load() {
            // 获取 Issues 列表
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/1/comments`);
            const comments = await res.json();
            const chat = document.getElementById('chat');
            
            if (!comments.length) {
                chat.innerHTML = "基地目前空空如也，去 Issue #1 留个言？";
                return;
            }

            chat.innerHTML = comments.map(c => `
                <div class="msg ${c.user.login === OWNER ? 'user' : 'gemini'}">
                    ${c.body}
                    <div class="time">${new Date(c.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
