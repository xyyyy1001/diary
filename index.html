<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>秘密基地</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            /* 气泡颜色修改 */
            --user-bubble: #db61a2; /* 你的气泡：精致粉 */
            --ai-bubble: #388bfd;   /* 我的气泡：清爽蓝 */
            --border: #30363d;
            --accent: #f06292;
        }
        body, html { 
            background: var(--bg-color); 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        /* --- 首页样式 --- */
        #main-page {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #161b22 0%, #0d1117 100%);
            z-index: 100;
            position: absolute;
            width: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--user-bubble));
        }
        .enter-btn {
            background: transparent;
            border: 2px solid var(--user-bubble);
            color: var(--user-bubble);
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .enter-btn:active {
            background: var(--user-bubble);
            color: white;
            transform: scale(0.95);
        }

        /* --- 聊天室布局 --- */
        #chat-container {
            display: none; /* 初始隐藏 */
            flex-direction: column;
            height: 100dvh;
        }
        header {
            padding: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(10px);
        }
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px;
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* --- 气泡样式 --- */
        .msg { 
            padding: 12px 16px; 
            border-radius: 20px; 
            max-width: 80%; 
            font-size: 16px; 
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        .user { 
            align-self: flex-end; 
            background: var(--user-bubble); 
            color: white;
            border-bottom-right-radius: 4px;
        }
        .gemini { 
            align-self: flex-start; 
            background: var(--ai-bubble); 
            color: white;
            border-bottom-left-radius: 4px;
        }

        /* --- 输入框 --- */
        .input-bar { 
            display: flex; 
            gap: 8px; 
            padding: 15px; 
            background: #161b22;
            border-top: 1px solid var(--border);
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        input { 
            flex: 1; 
            background: #0d1117; 
            border: 1px solid var(--border); 
            color: white; 
            padding: 12px 18px; 
            border-radius: 25px; 
            font-size: 16px;
            outline: none;
        }
        button { 
            background: var(--user-bubble); 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 25px; 
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 首页 -->
    <div id="main-page">
        <div class="logo">🌸</div>
        <h2 style="color: white; letter-spacing: 2px;">个人秘密基地</h2>
        <p style="color: #8b949e; margin-bottom: 30px;">记录此刻的心情</p>
        <button class="enter-btn" onclick="enterBase()">进入基地</button>
    </div>

    <!-- 聊天页 -->
    <div id="chat-container">
        <header>🔒 连线中...</header>
        <div id="chat"></div>
        <div class="input-bar">
            <input type="text" id="ipt" placeholder="想说什么..." autocomplete="off">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDiBOy5BmECF7k27wVn0v-BL2EikISqK60",
          authDomain: "diary-8de7a.firebaseapp.com",
          databaseURL: "https://diary-8de7a-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "diary-8de7a",
          storageBucket: "diary-8de7a.firebasestorage.app",
          messagingSenderId: "960175460075",
          appId: "1:960175460075:web:2d24b76c1964248a5678ae"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');

        // 切换页面逻辑
        function enterBase() {
            document.getElementById('main-page').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                scrollToBottom();
            }, 500);
        }

        function send() {
            const val = document.getElementById('ipt').value;
            if(!val) return;
            db.push({ content: val, author: 'User', time: Date.now() });
            document.getElementById('ipt').value = '';
        }

        document.getElementById('ipt').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') send();
        });

        function scrollToBottom() {
            const flow = document.getElementById('chat');
            flow.scrollTop = flow.scrollHeight;
        }

        db.on('value', (snap) => {
            const data = snap.val();
            const flow = document.getElementById('chat');
            if(!data) return;
            
            const sortedMsgs = Object.values(data).sort((a, b) => a.time - b.time);
            flow.innerHTML = sortedMsgs.map(m => `
                <div class="msg ${m.author === 'Gemini' ? 'gemini' : 'user'}">${m.content}</div>
            `).join('');
            
            setTimeout(scrollToBottom, 100);
        });
    </script>
</body>
</html>
